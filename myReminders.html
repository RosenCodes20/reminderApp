<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="myReminders.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>MyReminders</title>
</head>
<body>
    <header>
        <div class="logo-div">
            <img src="images/logo.png" alt="">
        </div>
        <nav>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">My Reminders</a></li>
                <li><a href="">Settings</a></li>
            </ul>
        </nav>
        <div class="login-nav">
            <ul>
                <li><a href="" class="login-btn">Login</a></li>
            </ul>
        </div>
    </header>
    
    <main class="myReminderMain">
        <div class="myRemindersDiv">
            <h1>My Reminders</h1>
            <a href="" class="addReminderMyReminders"><i class="fa-solid fa-plus"></i> Add Reminder</a>
        </div>
        
        <div class="myReminders">
            <div class="reminders">
                <a href="" class="today">Today</a>
                <a href="" class="upcoming">Upcoming</a>
                <a href="" class="completed">Completed</a>
            </div>

            <div class="cards">
                <div class="reminder-card">
                    <div class="reminder-info">
                        <h5>Doctor Appointment</h5>
                        <p>25 Feb 2026 • 14:30</p>
                    </div>
                    <div class="reminder-actions">
                        <i class="fa-solid fa-check"></i>
                        <i class="fa-solid fa-trash"></i>
                    </div>
                </div>
                
                <div class="reminder-card">
                    <div class="reminder-info">
                        <h5>Team Meeting</h5>
                        <p>26 Feb 2026 • 10:00</p>
                    </div>
                    <div class="reminder-actions">
                        <i class="fa-solid fa-check"></i>
                        <i class="fa-solid fa-trash"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div class="footer-basic">
        <footer>
            <div class="social">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-snapchat"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
            </div>
            <ul class="list-inline">
                <li class="list-inline-item"><a href="#">Home</a></li>
                <li class="list-inline-item"><a href="#">My Reminders</a></li>
                <li class="list-inline-item"><a href="#">Settings</a></li>
                <li class="list-inline-item"><a href="#">Login</a></li>
            </ul>
            <p class="copyright">Petar Kolev :) and Rosen Ivanov &copy; 2026</p>
        </footer>
    </div>
</body>
</html>
